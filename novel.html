<!DOCTYPE html>
<html lang="zh-CN" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>小说详情 - 日文小说</title>
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>📚</text></svg>">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500;700&family=Noto+Serif+JP:wght@400;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="assets/css/style.css">
</head>
<body>

<!-- 导航栏 -->
<nav class="navbar">
  <div class="nav-inner">
    <a href="index.html" class="nav-logo">
      <span class="logo-icon">📚</span>
      <span class="logo-text">日文小说</span>
    </a>
    <div class="nav-search">
      <input type="search" id="nav-search-input" placeholder="搜索小说…" autocomplete="off"
             onkeydown="if(event.key==='Enter') location.href='index.html?q='+encodeURIComponent(this.value)">
      <button onclick="location.href='index.html?q='+encodeURIComponent(document.getElementById('nav-search-input').value)">搜索</button>
    </div>
    <div class="nav-actions">
      <button class="icon-btn" id="theme-toggle" title="切换主题">🌙</button>
    </div>
  </div>
</nav>

<!-- 小说详情内容 -->
<div class="novel-detail" id="novel-detail">
  <div class="loading-wrap" style="padding:80px">
    <div class="spinner"></div>
    <span>正在获取小说信息…</span>
  </div>
</div>

<footer>
  <p>内容版权归原作者所有，本站仅提供检索服务</p>
</footer>

<script src="assets/js/config.js"></script>
<script src="assets/js/api.js"></script>
<script src="assets/js/ui.js"></script>
<script src="assets/js/novel.js"></script>
</body>
</html>
